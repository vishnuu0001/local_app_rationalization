  <rect x="60" y="198" width="138" height="32" rx="6" fill="#111827" stroke="#2d1e1e" stroke-width="1.5"/>
  <rect x="72" y="207" width="10" height="14" rx="3" fill="#f87171" opacity="0.7"/>
  <rect x="90" y="209" width="66" height="4" rx="2" fill="#1e3a4a"/>
  <rect x="90" y="217" width="46" height="4" rx="2" fill="#1e3a4a"/>
  <circle cx="182" cy="214" r="5" fill="#ef4444"/>


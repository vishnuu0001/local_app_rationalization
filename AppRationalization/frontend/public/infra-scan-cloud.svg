  <path d="M202 134 Q392 130 548 154" stroke="#818cf8" stroke-width="2" stroke-dasharray="8 4" fill="none" opacity="0.9"/>
  <polygon points="541,148 554,152 546,162" fill="#818cf8" opacity="0.9"/>
  <rect x="308" y="113" width="106" height="22" rx="11" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="361" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#c7d2fe">Smart Shift</text>


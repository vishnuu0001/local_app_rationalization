  <polygon points="541,167 554,172 546,182" fill="#fb923c" opacity="0.9"/>
  <rect x="308" y="166" width="106" height="22" rx="11" fill="#1c0a03" stroke="#f97316" stroke-width="1"/>
  <text x="361" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fdba74">PaaS</text>


  <!-- Lift & Shift (green) -->
  <path d="M202 94 Q392 76 548 136" stroke="#10b981" stroke-width="2" stroke-dasharray="8 4" fill="none" opacity="0.9"/>
  <polygon points="541,129 554,134 546,145" fill="#10b981" opacity="0.9"/>
  <rect x="308" y="62" width="106" height="22" rx="11" fill="#022c22" stroke="#059669" stroke-width="1"/>
  <text x="361" y="77" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#6ee7b7">Lift &amp; Shift</text>


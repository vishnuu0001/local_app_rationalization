  <!-- Server 1 – ready (green) -->
  <rect x="60" y="78" width="138" height="32" rx="6" fill="#111827" stroke="#1d2d3f" stroke-width="1.5"/>
  <rect x="72" y="87" width="10" height="14" rx="3" fill="#2dd4bf" opacity="0.85"/>
  <rect x="90" y="89" width="66" height="4" rx="2" fill="#1e3a4a"/>
  <rect x="90" y="97" width="46" height="4" rx="2" fill="#1e3a4a"/>
  <circle cx="182" cy="94" r="5" fill="#10b981"/>

  <!-- Server 2 – ready (green) -->
  <rect x="60" y="118" width="138" height="32" rx="6" fill="#111827" stroke="#1d2d3f" stroke-width="1.5"/>
  <rect x="72" y="127" width="10" height="14" rx="3" fill="#2dd4bf" opacity="0.85"/>
  <rect x="90" y="129" width="66" height="4" rx="2" fill="#1e3a4a"/>
  <rect x="90" y="137" width="46" height="4" rx="2" fill="#1e3a4a"/>
  <circle cx="182" cy="134" r="5" fill="#10b981"/>

  <!-- Server 3 – partial (amber) -->
  <rect x="60" y="158" width="138" height="32" rx="6" fill="#111827" stroke="#1d2d3f" stroke-width="1.5"/>
  <rect x="72" y="167" width="10" height="14" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="90" y="169" width="66" height="4" rx="2" fill="#1e3a4a"/>
  <rect x="90" y="177" width="46" height="4" rx="2" fill="#1e3a4a"/>
  <circle cx="182" cy="174" r="5" fill="#f59e0b"/>


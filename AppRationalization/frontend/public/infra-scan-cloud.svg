  <rect x="55" y="296" width="172" height="106" rx="14" fill="#0d1b2a" stroke="#1d3d55" stroke-width="1"/>
  <text x="75" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Cloud Ready</text>

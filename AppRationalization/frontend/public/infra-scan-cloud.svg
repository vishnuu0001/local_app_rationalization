  <text x="726" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" letter-spacing="2" fill="#475569">CLOUD TARGET</text>

  <!-- Cloud blob -->
  <path d="M618 163 Q616 136 638 128 Q642 106 668 114 Q676 92 704 102 Q716 82 742 94 Q768 78 782 98 Q808 86 814 110 Q836 106 840 132 Q856 136 852 161 Q852 180 832 180 L636 180 Q618 180 618 163Z" fill="#0c2340" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="730" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#38bdf8">Azure</text>
  <text x="730" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7dd3fc">Cloud Target</text>


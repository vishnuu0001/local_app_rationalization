  <rect x="244" y="296" width="180" height="106" rx="14" fill="#0d1b2a" stroke="#1d3d55" stroke-width="1"/>
  <text x="264" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Strategy Mix</text>
  <rect x="264" y="334" width="65" height="10" rx="5" fill="#10b981"/>
  <text x="337" y="344" font-family="system-ui,sans-serif" font-size="10" fill="#6ee7b7">L&amp;S 42%</text>
  <rect x="264" y="350" width="46" height="10" rx="5" fill="#818cf8"/>
  <text x="317" y="360" font-family="system-ui,sans-serif" font-size="10" fill="#c7d2fe">Smart 30%</text>
  <rect x="264" y="366" width="43" height="10" rx="5" fill="#fb923c"/>
  <text x="314" y="376" font-family="system-ui,sans-serif" font-size="10" fill="#fed7aa">PaaS 28%</text>

  <!-- Card 3: Potential Savings -->
  <rect x="441" y="296" width="180" height="106" rx="14" fill="#0d1b2a" stroke="#1d3d55" stroke-width="1"/>
  <text x="461" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Potential Savings</text>
  <text x="461" y="358" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#818cf8">38%</text>
  <text x="461" y="382" font-family="system-ui,sans-serif" font-size="10" fill="#475569">vs current OnPrem</text>

  <!-- Card 4: EOS Risk -->
  <rect x="638" y="296" width="207" height="106" rx="14" fill="#0d1b2a" stroke="#3d1515" stroke-width="1"/>
  <text x="658" y="322" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">EOS Risk</text>
  <text x="658" y="358" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#f87171">3</text>
  <text x="658" y="382" font-family="system-ui,sans-serif" font-size="10" fill="#475569">workloads end-of-support</text>
</svg>

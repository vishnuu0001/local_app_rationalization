version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///infra_assessment.db
      - UPLOAD_FOLDER=/app/uploads
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: python run.py
    networks:
      - infra-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_ENV=development
    volumes:
      - ./frontend/src:/app/src
    command: npm start
    networks:
      - infra-network
    depends_on:
      - backend

networks:
  infra-network:
    driver: bridge
